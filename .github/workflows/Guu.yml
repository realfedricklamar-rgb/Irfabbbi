# .github/workflows/hosted-persistent-ssh.yml
name: Hosted Persistent SSH Session

on:
  workflow_dispatch:
    inputs:
      session_duration_minutes:
        description: 'Maximum duration for the SSH session (minutes, max 360)'
        required: true
        default: 360
        type: number

jobs:
  interactive_ssh_session:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Configure Clean SSH Environment
      run: |
        sudo apt-get update && sudo apt-get install -y openssh-server jq
        
        # Enforce strict public-key authentication configurations
        sudo sed -i 's/PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
        sudo sed -i 's/#StrictHostKeyChecking ask/StrictHostKeyChecking no/' /etc/ssh/ssh_config
        
        # Force systemd to fully register configuration updates across active sockets
        sudo systemctl daemon-reload
        sudo systemctl restart ssh.socket ssh.service
        echo "✅ Clean SSH daemon running."
      shell: bash

    - name: Install and Configure Ngrok
      run: |
        sudo mkdir -p /usr/share/keyrings
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo gpg --dearmor -o /usr/share/keyrings/ngrok.gpg
        
        echo "deb [signed-by=/usr/share/keyrings/ngrok.gpg] https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install -y ngrok
        
        ngrok config add-authtoken "${{ secrets.NGROK_AUTHTOKEN }}"
      shell: bash

    - name: Authorize Your Personal Public Key
      run: |
        mkdir -p $HOME/.ssh
        
        # Inject your specific public key exactly as provided
        echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOcnm0bL4n7JzFC85yX5Zxamk/0RZY9/6MMRUnh+rMz/" > $HOME/.ssh/authorized_keys
        
        # Set absolute POSIX permission compliance for OpenSSH to accept it
        chmod 600 $HOME/.ssh/authorized_keys
        chmod 700 $HOME/.ssh
        chmod 755 $HOME
        
        echo "✅ Public key authorized for user: runner"
      shell: bash

    - name: Establish Public Tunnel and Hold Session Open
      run: |
        DURATION_MINUTES=${{ inputs.session_duration_minutes }}
        DURATION_SECONDS=$(( DURATION_MINUTES * 60 ))
        
        # Fire up Ngrok TCP tunnel pointing directly to local SSH port 22
        # Using standard multi-tenant agent execution
        ngrok tcp 22 --log=stdout > /dev/null &
        sleep 5
        
        # Fetch the public URL generated by Ngrok
        PUBLIC_ADDRESS=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        CLEAN_ADDRESS=$(echo $PUBLIC_ADDRESS | sed 's/tcp:\/\///')
        TUNNEL_HOST=$(echo $CLEAN_ADDRESS | cut -d':' -f1)
        TUNNEL_PORT=$(echo $CLEAN_ADDRESS | cut -d':' -f2)
        
        echo "=========================================================="
        echo "🚀 CLEAN SSH ENVIRONMENT IS NOW ONLINE"
        echo "=========================================================="
        echo "Host String: $TUNNEL_HOST"
        echo "Target Port: $TUNNEL_PORT"
        echo "User Profile: runner"
        echo "=========================================================="
        echo "Run this exact command in your terminal right now:"
        echo " "
        echo "   ssh runner@$TUNNEL_HOST -p $TUNNEL_PORT"
        echo "=========================================================="
        
        # Clean background sleep loop to keep the GitHub Action alive
        echo "⏳ Tunnel active. Awaiting connection..."
        sleep $DURATION_SECONDS || true
      shell: bash

    - name: Graceful Teardown
      if: always()
      run: |
        sudo systemctl stop ssh.service 2>/dev/null || true
        pkill ngrok || true
