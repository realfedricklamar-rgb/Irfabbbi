# .github/workflows/hosted-persistent-ssh.yml
name: Hosted Persistent SSH Session

on:
  workflow_dispatch:
    inputs:
      session_duration_minutes:
        description: 'Maximum duration for the SSH session (minutes, max 360)'
        required: true
        default: 360
        type: number

jobs:
  interactive_ssh_session:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Configure SSH and Tmux Environment
      run: |
        sudo apt-get update && sudo apt-get install -y openssh-server tmux jq
        
        # Security & access tweaks for direct root access during this interactive session
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
        sudo sed -i 's/#StrictHostKeyChecking ask/StrictHostKeyChecking no/' /etc/ssh/ssh_config
        
        sudo service ssh restart
        echo "✅ SSH server and Tmux environment initialized."
      shell: bash

    - name: Install and Configure Ngrok
      run: |
        sudo mkdir -p /usr/share/keyrings
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo gpg --dearmor -o /usr/share/keyrings/ngrok.gpg
        
        echo "deb [signed-by=/usr/share/keyrings/ngrok.gpg] https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install -y ngrok
        
        ngrok config add-authtoken "${{ secrets.NGROK_AUTHTOKEN }}"
      shell: bash

    - name: Authorize User Public Key
      run: |
        sudo mkdir -p /root/.ssh
        
        # Inject your specific public key directly into the root user's authorized_keys
        echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOcnm0bL4n7JzFC85yX5Zxamk/0RZY9/6MMRUnh+rMz/" | sudo tee /root/.ssh/authorized_keys > /dev/null
        
        # Set strict, required permissions for SSH to accept the key
        sudo chmod 600 /root/.ssh/authorized_keys
        sudo chmod 700 /root/.ssh
        sudo chown -R root:root /root/.ssh
        
        echo "✅ Authorized your personal public key for root access."
      shell: bash

    - name: Start Public Tunnel and Keep Session Alive
      run: |
        DURATION_MINUTES=${{ inputs.session_duration_minutes }}
        DURATION_SECONDS=$(( DURATION_MINUTES * 60 ))
        
        # Start ngrok tunnel in the background pointing to local SSH port 22
        ngrok tcp 22 --log=stdout > /dev/null &
        sleep 5
        
        # Fetch the public URL generated by Ngrok
        PUBLIC_ADDRESS=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        
        CLEAN_ADDRESS=$(echo $PUBLIC_ADDRESS | sed 's/tcp:\/\///')
        TUNNEL_HOST=$(echo $CLEAN_ADDRESS | cut -d':' -f1)
        TUNNEL_PORT=$(echo $CLEAN_ADDRESS | cut -d':' -f2)
        
        echo "=========================================================="
        echo "🚀 INTERACTIVE PUBLIC SSH SESSION ACTIVE"
        echo "=========================================================="
        echo "Public Host: $TUNNEL_HOST"
        echo "Public Port: $TUNNEL_PORT"
        echo "User:        root"
        echo "Max Runtime: $DURATION_MINUTES minutes"
        echo "----------------------------------------------------------"
        echo "Instructions to Connect From Your PC:"
        echo "Run this exact SSH command from your local terminal:"
        echo " "
        echo "   ssh root@$TUNNEL_HOST -p $TUNNEL_PORT"
        echo " "
        echo "Once connected, attach to your persistent shell workspace:"
        echo "   tmux attach -t persistent_session"
        echo "=========================================================="
        
        # Spin up background tmux session
        sudo tmux new-session -d -s persistent_session
        sudo tmux send-keys -t persistent_session "echo 'Welcome to your persistent runner environment!'" C-m
        sudo tmux send-keys -t persistent_session "bash" C-m
        
        # Keep runner alive
        sleep $DURATION_SECONDS || true
      shell: bash

    - name: Graceful Teardown
      if: always()
      run: |
        sudo tmux kill-server 2>/dev/null || true
        sudo service ssh stop 2>/dev/null || true
        pkill ngrok || true
