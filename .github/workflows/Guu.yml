# .github/workflows/hosted-persistent-ssh.yml
name: Hosted Persistent SSH Session

on:
  workflow_dispatch:
    inputs:
      session_duration_minutes:
        description: 'Maximum duration for the SSH session (minutes, max 360)'
        required: true
        default: 360
        type: number

jobs:
  interactive_ssh_session:
    runs-on: ubuntu-latest
    # Hardcoded global safety net to prevent infinite hangs if something goes wrong.
    # The actual user timeout is controlled dynamically inside the steps below.
    timeout-minutes: 360

    steps:
    - name: Configure SSH and Tmux Environment
      run: |
        sudo apt-get update && sudo apt-get install -y openssh-server tmux
        
        # Security & access tweaks for direct root access during this interactive session
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
        sudo sed -i 's/#StrictHostKeyChecking ask/StrictHostKeyChecking no/' /etc/ssh/ssh_config
        
        sudo service ssh restart
        echo "✅ SSH server and Tmux environment initialized."
      shell: bash

    - name: Generate One-Time SSH Key Pair
      id: generate_key
      run: |
        # Generate non-interactive SSH keypair
        ssh-keygen -t ed25519 -f ./id_ed25519 -N ""
        
        sudo mkdir -p /root/.ssh
        cat ./id_ed25519.pub | sudo tee /root/.ssh/authorized_keys > /dev/null
        sudo chmod 600 /root/.ssh/authorized_keys
        sudo chmod 700 /root/.ssh
        sudo chown -R root:root /root/.ssh
        
        # Safely register the private key to GitHub step outputs
        echo "PRIVATE_KEY<<EOF" >> $GITHUB_OUTPUT
        cat ./id_ed25519 >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "✅ Temporary ED25519 SSH keys configured for root access."
      shell: bash

    - name: Start Tmux and Keep Session Alive
      run: |
        RUNNER_IP=$(hostname -I | awk '{print $1}')
        DURATION_MINUTES=${{ inputs.session_duration_minutes }}
        DURATION_SECONDS=$(( DURATION_MINUTES * 60 ))
        
        echo "=========================================================="
        echo "🚀 INTERACTIVE SSH SESSION ACTIVE"
        echo "=========================================================="
        echo "Host IP:     $RUNNER_IP"
        echo "User:        root"
        echo "Port:        22"
        echo "Max Runtime: $DURATION_MINUTES minutes ($DURATION_SECONDS seconds)"
        echo "----------------------------------------------------------"
        echo "Instructions:"
        echo "1. Save the private key from the previous step as 'runner.key'"
        echo "2. Run: chmod 600 runner.key"
        echo "3. Run: ssh -i runner.key root@$RUNNER_IP"
        echo "4. Once connected, attach to your persistent shell workspace:"
        echo "   tmux attach -t persistent_session"
        echo "=========================================================="
        
        # Spin up background tmux session with a warm welcome prompt
        sudo tmux new-session -d -s persistent_session
        sudo tmux send-keys -t persistent_session "echo 'Welcome to your persistent runner environment!'" C-m
        sudo tmux send-keys -t persistent_session "echo 'Type your commands here. Detach anytime via Ctrl+B followed by D.'" C-m
        sudo tmux send-keys -t persistent_session "bash" C-m
        
        echo "⏳ Keeping session alive. Terminal will stay responsive until timeout or manual cancellation..."
        
        # Keeps step running securely for the requested period without triggering parser errors
        sleep $DURATION_SECONDS || true
        
        echo "🛑 Allocation time expired. Tearing down environment."
      shell: bash

    - name: Graceful Teardown
      if: always()
      run: |
        echo "Cleaning session contexts, killing background processes, and destroying runner."
        sudo tmux kill-server 2>/dev/null || true
        sudo service ssh stop 2>/dev/null || true
