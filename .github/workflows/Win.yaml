name: Hosted Persistent Windows SSH & App Session

on:
  workflow_dispatch:
    inputs:
      session_duration_minutes:
        description: 'Maximum duration for the session (minutes, max 360)'
        required: true
        default: 360
        type: number

jobs:
  interactive_ssh_session:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Configure Clean SSH Environment
      shell: powershell
      run: |
        Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 -ErrorAction SilentlyContinue
        Start-Service sshd
        Set-Service -Name sshd -StartupType 'Automatic'
        
        $sshdConfigPath = "$env:ProgramData\ssh\sshd_config"
        (Get-Content $sshdConfigPath) -replace '#PubkeyAuthentication yes', 'PubkeyAuthentication yes' | Set-Content $sshdConfigPath
        Restart-Service sshd
        Write-Host "✅ OpenSSH Daemon running on Windows."

    - name: Install and Configure Ngrok
      shell: powershell
      run: |
        choco install ngrok -y
        # Authenticate ngrok globally
        & ngrok config add-authtoken "${{ secrets.NGROK_AUTHTOKEN }}"
        Write-Host "✅ Ngrok installed."

    - name: Authorize Your Personal Public Key
      shell: powershell
      run: |
        $sshDir = "$env:USERPROFILE\.ssh"
        if (!(Test-Path $sshDir)) { New-Item -ItemType Directory -Path $sshDir }
        
        $pubKey = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOcnm0bL4n7JzFC85yX5Zxamk/0RZY9/6MMRUnh+rMz/"
        Set-Content -Path "$sshDir\authorized_keys" -Value $pubKey -Encoding utf8
        
        $sshdConfigPath = "$env:ProgramData\ssh\sshd_config"
        $config = Get-Content $sshdConfigPath
        $config = $config -replace 'Match Group administrators', '#Match Group administrators'
        $config = $config -replace 'AuthorizedKeysFile __PROGRAMDATA__/ssh/administrators_authorized_keys', '#AuthorizedKeysFile __PROGRAMDATA__/ssh/administrators_authorized_keys'
        Set-Content $sshdConfigPath $config
        
        Restart-Service sshd
        Write-Host "✅ Public key authorized for user: runneradmin"

    - name: Establish Public Tunnels and Hold Session Open
      shell: powershell
      run: |
        $DurationMinutes = ${{ inputs.session_duration_minutes }}
        $DurationSeconds = $DurationMinutes * 60
        
        # 1. Create a Ngrok configuration file defining both tunnels
        # Note: If your app on 3000 expects HTTP/HTTPS traffic, use proto: http
        $ngrokConfig = @"
        version: "2"
        authtoken: "${{ secrets.NGROK_AUTHTOKEN }}"
        tunnels:
          ssh-tunnel:
            proto: tcp
            addr: 22
          app-tunnel:
            proto: tcp
            addr: 3389
        "@
        
        $configPath = "$env:USERPROFILE\.ngrok_dual_config.yml"
        Set-Content -Path $configPath -Value $ngrokConfig
        
        # 2. Spin up Ngrok pointing to our custom configuration and start ALL defined tunnels
        Start-Process -FilePath "ngrok" -ArgumentList "start --all --config=$configPath" -WindowStyle Hidden
        Start-Sleep -Seconds 7
        
        # 3. Query the local Ngrok API endpoint to grab BOTH public URLs
        $NgrokApi = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
        
        # Parse SSH Details (finding the tunnel named 'ssh-tunnel')
        $SshTunnel = $NgrokApi.tunnels | Where-Object { $_.name -eq "ssh-tunnel" }
        $CleanSshAddress = $SshTunnel.public_url -replace "tcp://", ""
        $TunnelHost = $CleanSshAddress.Split(":")[0]
        $TunnelPort = $CleanSshAddress.Split(":")[1]
        
        # Parse App Details (finding the tunnel named 'app-tunnel')
        $AppTunnel = $NgrokApi.tunnels | Where-Object { $_.name -eq "app-tunnel" }
        $AppUrl = $AppTunnel.public_url
        
        Write-Host "=========================================================="
        Write-Host "🚀 DUAL PORT TUNNEL ENVIRONMENT IS NOW ONLINE"
        Write-Host "=========================================================="
        Write-Host "🔒 [SSH ACCESS]"
        Write-Host "   Command:  ssh runneradmin@$TunnelHost -p $TunnelPort"
        Write-Host "----------------------------------------------------------"
        Write-Host "🌐 [APP ACCESS (PORT 3389)]"
        Write-Host "   URL:      $AppUrl"
        Write-Host "=========================================================="
        
        Write-Host "⏳ Tunnels active. Awaiting connection..."
        Start-Sleep -Seconds $DurationSeconds

    - name: Graceful Teardown
      if: always()
      shell: powershell
      run: |
        Stop-Service sshd -ErrorAction SilentlyContinue
        Stop-Process -Name ngrok -Force -ErrorAction SilentlyContinue
